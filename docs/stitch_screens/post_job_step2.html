<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JobNow - Post Job Step 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "primary-dark": "#1d4ed8",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2233",
                        "text-primary-light": "#111318",
                        "text-primary-dark": "#f1f5f9",
                        "text-secondary-light": "#616e89",
                        "text-secondary-dark": "#94a3b8",
                        "border-light": "#dbdee6",
                        "border-dark": "#334155",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", 
                        "lg": "1rem", 
                        "xl": "1.5rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center">
<!-- Mobile Device Container -->
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col bg-surface-light dark:bg-surface-dark overflow-hidden shadow-2xl sm:rounded-xl sm:h-[844px] sm:min-h-0 sm:border border-border-light dark:border-border-dark">
<!-- Header -->
<header class="flex items-center justify-between p-4 pb-2 bg-surface-light dark:bg-surface-dark sticky top-0 z-20">
<button class="text-text-primary-light dark:text-text-primary-dark flex size-10 shrink-0 items-center justify-center hover:bg-background-light dark:hover:bg-background-dark rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-text-primary-light dark:text-text-primary-dark text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Đăng tuyển dụng</h2>
</header>
<!-- Progress Bar & Step Info -->
<div class="flex flex-col gap-3 px-6 pt-2 pb-4 border-b border-border-light/50 dark:border-border-dark/50 bg-surface-light dark:bg-surface-dark">
<div class="flex gap-6 justify-between items-end">
<p class="text-text-primary-light dark:text-text-primary-dark text-lg font-bold leading-normal">Lương &amp; Địa điểm</p>
<p class="text-primary font-semibold text-sm leading-normal">Bước 2/4</p>
</div>
<div class="h-2 w-full rounded-full bg-background-light dark:bg-background-dark overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 50%;"></div>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-24">
<div class="flex flex-col gap-6 p-6">
<!-- Salary Section -->
<section>
<h3 class="text-text-primary-light dark:text-text-primary-dark text-xl font-bold leading-tight mb-4">Mức lương</h3>
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-text-primary-light dark:text-text-primary-dark text-sm font-medium">Số tiền (VNĐ)</label>
<div class="relative">
<input class="w-full rounded-xl border border-border-light dark:border-border-dark bg-background-light dark:bg-surface-dark/50 p-4 text-base font-medium text-text-primary-light dark:text-text-primary-dark placeholder:text-text-secondary-light dark:placeholder:text-text-secondary-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Ví dụ: 50.000" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary-light dark:text-text-secondary-dark pointer-events-none">
<span class="material-symbols-outlined text-xl">payments</span>
</div>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-text-primary-light dark:text-text-primary-dark text-sm font-medium">Hình thức trả</label>
<div class="relative">
<select class="w-full rounded-xl border border-border-light dark:border-border-dark bg-background-light dark:bg-surface-dark/50 p-4 pr-10 text-base font-medium text-text-primary-light dark:text-text-primary-dark appearance-none focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all cursor-pointer">
<option value="hourly">Theo giờ</option>
<option value="daily">Theo ngày</option>
<option value="monthly">Theo tháng</option>
<option value="project">Theo dự án</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-text-primary-light dark:text-text-primary-dark pointer-events-none">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</section>
<!-- Location Section -->
<section>
<h3 class="text-text-primary-light dark:text-text-primary-dark text-xl font-bold leading-tight mb-4">Địa điểm làm việc</h3>
<!-- Map Container -->
<div class="relative w-full h-56 rounded-xl overflow-hidden border border-border-light dark:border-border-dark shadow-sm bg-background-light dark:bg-background-dark mb-4 group cursor-grab active:cursor-grabbing">
<!-- Map Image Placeholder -->
<div class="w-full h-full bg-cover bg-center" data-alt="Bản đồ hiển thị đường phố thành phố Hồ Chí Minh" data-location="Ho Chi Minh City" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA3IQPt5PYyIqhQwhQeESndNJ0xMR7DLWO9279TLnXCsprV3Sr1Md9i6IuJQP37dNYCet_UjyQBWjmQqg93ndikyqjtOv7OmcjBpS0xVbOZhcqr1PnzpPlhojMBUa0uh7Vo3ZFe4gKm-aodyFecdjF5uayzPCphd9sE9PtwRQQx-XbMDkrkib5u64qAjc9bMzw8kRoXRHUxyde7xIhjyQLEhr1dIvSi9MXmsijy6CI3hrH3uD07CBOeSZHVbQX0TJGO_FJJSmy87B8');"></div>
<!-- Map Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent pointer-events-none"></div>
<!-- Draggable Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-full flex flex-col items-center drop-shadow-lg animate-bounce">
<span class="material-symbols-outlined text-4xl text-red-500 filled">location_on</span>
<div class="w-2 h-1 bg-black/30 rounded-full blur-[1px]"></div>
</div>
<!-- Zoom Controls -->
<div class="absolute bottom-3 right-3 flex flex-col gap-1 bg-surface-light dark:bg-surface-dark rounded-lg shadow-md border border-border-light dark:border-border-dark overflow-hidden">
<button class="p-1.5 hover:bg-background-light dark:hover:bg-background-dark text-text-primary-light dark:text-text-primary-dark transition-colors">
<span class="material-symbols-outlined text-lg">add</span>
</button>
<div class="h-[1px] w-full bg-border-light dark:bg-border-dark"></div>
<button class="p-1.5 hover:bg-background-light dark:hover:bg-background-dark text-text-primary-light dark:text-text-primary-dark transition-colors">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
</div>
</div>
<!-- Address Input -->
<div class="flex flex-col gap-1.5">
<label class="text-text-primary-light dark:text-text-primary-dark text-sm font-medium">Địa chỉ chi tiết</label>
<div class="flex items-center gap-2 rounded-xl border border-border-light dark:border-border-dark bg-background-light dark:bg-surface-dark/50 p-4 transition-all focus-within:border-primary focus-within:ring-1 focus-within:ring-primary">
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark">near_me</span>
<input class="w-full bg-transparent border-none p-0 text-base font-medium text-text-primary-light dark:text-text-primary-dark placeholder:text-text-secondary-light dark:placeholder:text-text-secondary-dark focus:ring-0 outline-none" type="text" value="123 Đường Nguyễn Huệ, Quận 1, TP.HCM"/>
</div>
<p class="text-xs text-text-secondary-light dark:text-text-secondary-dark mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">info</span>
                            Kéo thả ghim để điều chỉnh vị trí chính xác
                        </p>
</div>
</section>
</div>
</div>
<!-- Footer Actions -->
<div class="absolute bottom-0 left-0 w-full bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark p-4 pb-8 sm:pb-4 flex gap-4 z-10">
<button class="flex-1 flex items-center justify-center h-12 rounded-xl border border-border-light dark:border-border-dark text-text-primary-light dark:text-text-primary-dark font-semibold text-base hover:bg-background-light dark:hover:bg-background-dark transition-colors">
                Quay lại
            </button>
<button class="flex-1 flex items-center justify-center h-12 rounded-xl bg-primary hover:bg-primary-dark text-white font-semibold text-base shadow-lg shadow-blue-500/30 transition-all active:scale-[0.98]">
                Tiếp theo
            </button>
</div>
</div>
</body></html>
