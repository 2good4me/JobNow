<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post Job - Step 1 Info</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "slate-900": "#0f172a",
                        "slate-500": "#64748b",
                        "slate-200": "#e2e8f0",
                        "slate-100": "#f1f5f9",
                        "slate-50": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "0.75rem", /* Matching 12px requirement broadly */
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<!-- Mobile Container -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 min-h-screen flex flex-col shadow-2xl relative">
<!-- Header -->
<div class="sticky top-0 z-10 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between p-4 pb-2">
<button class="flex h-10 w-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100 text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight">Post a Job</h2>
<button class="flex h-10 items-center justify-center px-2">
<span class="text-slate-500 dark:text-slate-400 text-sm font-semibold hover:text-slate-700 dark:hover:text-slate-200 transition-colors">Cancel</span>
</button>
</div>
<!-- Stepper Progress -->
<div class="px-6 py-4">
<div class="flex items-center justify-between relative">
<!-- Progress Line Background -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-slate-100 dark:bg-slate-800 rounded-full -z-10"></div>
<!-- Active Progress Line (25% for step 1) -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-[15%] h-1 bg-primary rounded-full -z-10"></div>
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-1">
<div class="h-8 w-8 rounded-full bg-primary flex items-center justify-center ring-4 ring-white dark:ring-slate-900">
<span class="text-white text-xs font-bold">1</span>
</div>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-1">
<div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center ring-4 ring-white dark:ring-slate-900">
<span class="text-slate-500 dark:text-slate-400 text-xs font-bold">2</span>
</div>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-1">
<div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center ring-4 ring-white dark:ring-slate-900">
<span class="text-slate-500 dark:text-slate-400 text-xs font-bold">3</span>
</div>
</div>
<!-- Step 4 -->
<div class="flex flex-col items-center gap-1">
<div class="h-8 w-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center ring-4 ring-white dark:ring-slate-900">
<span class="text-slate-500 dark:text-slate-400 text-xs font-bold">4</span>
</div>
</div>
</div>
<div class="flex justify-between mt-2 px-1">
<span class="text-xs font-medium text-primary">Basics</span>
<span class="text-xs font-medium text-slate-400 hidden sm:block">Details</span>
<span class="text-xs font-medium text-slate-400 hidden sm:block">Budget</span>
<span class="text-xs font-medium text-slate-400 hidden sm:block">Review</span>
</div>
</div>
</div>
<!-- Main Content -->
<div class="flex-1 overflow-y-auto px-4 py-6 space-y-8 pb-32">
<section>
<h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-6">Job Basics</h3>
<!-- Job Title Input -->
<div class="space-y-2 mb-6">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-200 ml-1">Job Title</label>
<div class="relative">
<input class="w-full h-14 rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white px-4 text-base focus:border-primary focus:ring-primary dark:focus:border-primary dark:focus:ring-primary transition-all placeholder:text-slate-400" placeholder="e.g. Waiter for Wedding Party" type="text" value="Cần 2 bạn chạy bàn tiệc cưới"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-green-500 material-symbols-outlined">check_circle</span>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 ml-1">A catchy title attracts more candidates.</p>
</div>
<!-- Job Category Scroll -->
<div class="space-y-2 mb-6">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-200 ml-1">Category</label>
<div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4">
<!-- Selected Item -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-primary text-white rounded-xl shadow-sm border border-primary transition-all">
<span class="material-symbols-outlined text-[20px]">restaurant</span>
<span class="text-sm font-medium whitespace-nowrap">F&amp;B Service</span>
</button>
<!-- Other Items -->
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined text-[20px]">storefront</span>
<span class="text-sm font-medium whitespace-nowrap">Retail</span>
</button>
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined text-[20px]">local_shipping</span>
<span class="text-sm font-medium whitespace-nowrap">Delivery</span>
</button>
<button class="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl border border-slate-200 dark:border-slate-700 hover:border-primary/50 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
<span class="material-symbols-outlined text-[20px]">event</span>
<span class="text-sm font-medium whitespace-nowrap">Event Helper</span>
</button>
</div>
</div>
<!-- Job Description -->
<div class="space-y-2 mb-6">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-200 ml-1">Job Description</label>
<textarea class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white p-4 text-base focus:border-primary focus:ring-primary dark:focus:border-primary dark:focus:ring-primary transition-all placeholder:text-slate-400 min-h-[140px] resize-none" placeholder="Describe the responsibilities, requirements, and benefits..."></textarea>
</div>
<!-- Gender Preference -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-900 dark:text-slate-200 ml-1">Gender Preference</label>
<div class="grid grid-cols-3 gap-2 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
<!-- Option: Male -->
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="male"/>
<div class="flex flex-col items-center justify-center py-3 rounded-[10px] text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-primary peer-checked:shadow-sm transition-all duration-200 h-full">
<span class="material-symbols-outlined mb-1">male</span>
<span class="text-xs font-semibold">Nam</span>
</div>
</label>
<!-- Option: Female -->
<label class="cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="female"/>
<div class="flex flex-col items-center justify-center py-3 rounded-[10px] text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-primary peer-checked:shadow-sm transition-all duration-200 h-full">
<span class="material-symbols-outlined mb-1">female</span>
<span class="text-xs font-semibold">Nữ</span>
</div>
</label>
<!-- Option: Both -->
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="gender" type="radio" value="both"/>
<div class="flex flex-col items-center justify-center py-3 rounded-[10px] text-slate-500 dark:text-slate-400 peer-checked:bg-white dark:peer-checked:bg-slate-700 peer-checked:text-primary peer-checked:shadow-sm transition-all duration-200 h-full">
<span class="material-symbols-outlined mb-1">wc</span>
<span class="text-xs font-semibold">Cả hai</span>
</div>
</label>
</div>
</div>
</section>
</div>
<!-- Footer Actions -->
<div class="absolute bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 p-4 pb-8">
<button class="w-full h-12 bg-primary hover:bg-blue-700 text-white font-semibold rounded-xl text-base shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                Tiếp theo
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
<!-- Decorative background elements for desktop view -->
<div class="hidden lg:block fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-400/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-400/20 rounded-full blur-3xl"></div>
</div>
</body></html>
